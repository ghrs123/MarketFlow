server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: marketflow-lab
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/marketflow}
    username: ${DB_USERNAME:marketflow}
    password: ${DB_PASSWORD:marketflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        "[format_sql]": true
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/marketflow}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/marketflow/protocol/openid-connect/certs}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,database,orderQueue,deadLetterQueue,processingEngine
        liveness:
          include: livenessState
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[marketflow]": true
  prometheus:
    metrics:
      export:
        enabled: true
  server:
    port: 8081
  info:
    env:
      enabled: true

info:
  app:
    name: marketflow-lab
    phase: 10-resilience
    description: MarketFlow Senior Java Cloud Lab - Resilience4j Patterns

marketflow:
  execution:
    worker-count: 4
    queue-capacity: 100
    processing-delay-millis: 50
    retry-max-attempts: 3
    retry-initial-backoff-millis: 100
    retry-max-backoff-millis: 2000
  resilience:
    broker-timeout-millis: 1200
    fix-transient-failures: 2

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: count_based
        sliding-window-size: 6
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
    instances:
      broker:
        base-config: default
      marketData:
        base-config: default
  retry:
    instances:
      fixMessage:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.gustavo.marketflow.resilience.infrastructure.TransientExternalServiceException
  ratelimiter:
    instances:
      orderCreation:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0
        register-health-indicator: true
  bulkhead:
    instances:
      orderProcessing:
        max-concurrent-calls: 4
        max-wait-duration: 0

logging:
  config: classpath:logback-spring.xml
  level:
    "[com.gustavo.marketflow]": DEBUG
    "[org.springframework.web]": INFO
