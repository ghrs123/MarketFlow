server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: marketflow-lab
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/marketflow}
    username: ${DB_USERNAME:marketflow}
    password: ${DB_PASSWORD:marketflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        "[format_sql]": true
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,database,orderQueue,deadLetterQueue,processingEngine
        liveness:
          include: livenessState
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[marketflow]": true
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: marketflow-lab
    phase: 08-observability
    description: MarketFlow Senior Java Cloud Lab - Observability

marketflow:
  execution:
    worker-count: 4
    queue-capacity: 100
    processing-delay-millis: 50
    retry-max-attempts: 3
    retry-initial-backoff-millis: 100
    retry-max-backoff-millis: 2000

logging:
  config: classpath:logback-spring.xml
  level:
    "[com.gustavo.marketflow]": DEBUG
    "[org.springframework.web]": INFO
