server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: marketflow-lab
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: marketflow-lab
    phase: 01-foundation-order-api
    description: MarketFlow Senior Java Cloud Lab - Phase 1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.gustavo.marketflow: DEBUG
    org.springframework.web: INFO
